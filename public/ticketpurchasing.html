<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Event Ticket Purchase</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f9f9f9;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .ticket-box {
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      width: 320px;
    }
    h2 {
      margin-top: 0;
      font-size: 18px;
    }
    .price {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 15px;
    }
    .row {
      margin: 10px 0;
    }
    .quantity-control {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .quantity-control button {
      padding: 5px 10px;
      font-size: 16px;
      cursor: pointer;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 12px;
      background: #0078d7;
      color: #fff;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 15px;
    }
    .note {
      font-size: 12px;
      color: #555;
      margin-top: 10px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="ticket-box">
    <h2>Tickets starting from</h2>
    <div class="price">$89.00 / person</div>

    <div class="row">
      <label for="ticketType">TICKET TYPE</label><br>
      <select id="ticketType">
        <option value="89">General Admission - $89.00</option>
        <option value="189">VIP - $189.00</option>
        <option value="250">Premium - $250.00</option>
      </select>
    </div>

    <div class="row">
      <label>QUANTITY</label>
      <div class="quantity-control">
        <button onclick="updateQuantity(-1)">-</button>
        <span id="quantity">2</span>
        <button onclick="updateQuantity(1)">+</button>
      </div>
    </div>

    <button class="btn" onclick="checkout()">Select Tickets →</button>

    <div class="note">No booking fees for early bird orders</div>
    <div class="note">Secure Transaction • Encrypted checkout process</div>
  </div>

  <script>
    let quantity = 2;

    function updateQuantity(change) {
      quantity = Math.max(1, quantity + change);
      document.getElementById("quantity").textContent = quantity;
    }

    function checkout() {
      const ticketType = document.getElementById("ticketType");
      const price = parseFloat(ticketType.value);
      const total = price * quantity;
      alert(`You selected ${quantity} ticket(s) of ${ticketType.options[ticketType.selectedIndex].text}. Total: $${total.toFixed(2)}`);
    }
  </script>
</body>
</html>
